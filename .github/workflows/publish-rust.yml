name: release-rust
on:
  release:
    types: [published]
jobs:
  check:
    if: startsWith(github.ref, 'refs/tags/rust/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: build
        run: cargo build --release

      - name: test
        run: cargo test

      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: coverage
        run: cargo llvm-cov --all-features --tests --lcov --output-path lcov.info

      - name: check threshold
        run: |
          LF=$(grep '^LF:' lcov.info | tail -1 | grep -oP '\d+')
          LH=$(grep '^LH:' lcov.info | tail -1 | grep -oP '\d+')
          echo "lines found: ${LF:-<empty>}, lines hit: ${LH:-<empty>}"
          if [ -z "$LF" ] || [ -z "$LH" ] || [ "$LF" = "0" ]; then
            echo "ERROR: cannot parse coverage data from lcov.info (LF=$LF, LH=$LH)"
            exit 1
          fi
          LINE=$(awk -v lf="$LF" -v lh="$LH" 'BEGIN { printf "%.2f", lh * 100 / lf }')
          echo "line coverage: ${LINE}%"
          awk -v line="$LINE" 'BEGIN { if (line + 0 < 95) { printf "FAIL: coverage %.1f%% < 95%%\n", line; exit 1 } }'
          echo "PASS: coverage ${LINE}% >= 95%"

  release:
    needs: [check]
    if: startsWith(github.ref, 'refs/tags/rust/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo publish
        run: cargo publish --allow-dirty --token ${{ secrets.CRATES_API_TOKEN }}
