name: test-rust

on:
  release:
    types: [published]

jobs:
  check:
    if: startsWith(github.ref, 'refs/tags/rust/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: build
        run: cargo build --release

      - name: test
        run: cargo test

      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: coverage
        run: cargo llvm-cov --all-features --tests --lcov --output-path lcov.info | tee coverage.txt

      - name: check threshold
        run: |
          LINE=$(grep -oP 'TOTAL.*?\K[\d.]+(?=%)' coverage.txt | tail -1)
          echo "line coverage: ${LINE}%"
          awk -v line="$LINE" 'BEGIN { if (line + 0 < 95) { printf "FAIL: coverage %.1f%% < 95%%\n", line; exit 1 } }'
          echo "PASS: coverage ${LINE}% >= 95%"
