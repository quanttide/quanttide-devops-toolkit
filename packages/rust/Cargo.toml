[package]
name = "quanttide-devops"
version = "0.3.0"
edition = "2024"
description = "QuantTide DevOps toolkit — 契约驱动的 DevOps 治理工具库"
authors = ["QuantTide <opensource@quanttide.com>"]
license = "Apache-2.0"
repository = "https://github.com/quanttide/quanttide-devops-toolkit"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
gix = "0.69"
semver = "1"
git2 = { version = "0.19", features = ["vendored-libgit2"] }
parse-changelog = { version = "0.6", default-features = false }
jiff = "0.2"
clap = { version = "4", features = ["derive"], optional = true }

[features]
default = []
clap = ["dep:clap"]

[dev-dependencies]
tempfile = "3"
